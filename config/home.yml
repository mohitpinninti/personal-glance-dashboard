- name: Home
  columns:
    - size: small
      widgets:
        - type: weather
          location: Bellevue, Washington, United States
          units: imperial
          hour-format: 12h

        - type: calendar
          first-day-of-week: monday

        - type: custom-api
          title: Upcoming Events
          cache: 15m
          template: |
            {{/* ================= TOKEN ================= */}}
            {{ $token := newRequest "https://oauth2.googleapis.com/token"
              | withHeader "Content-Type" "application/x-www-form-urlencoded"
              | withStringBody "client_id=${GOOGLE_CLIENT_ID}&client_secret=${GOOGLE_CLIENT_SECRET}&refresh_token=${GOOGLE_REFRESH_TOKEN}&grant_type=refresh_token"
              | getResponse }}

            {{ if ne $token.Response.StatusCode 200 }}
              <p>Token Error: {{ $token.Response.Status }}</p>
            {{ else }}

              {{ $accessToken := $token.JSON.String "access_token" }}
              {{ $now := now | formatTime "rfc3339" }}
              {{ $future := offsetNow "720h" | formatTime "rfc3339" }}

              {{/* ================= EVENTS ================= */}}
              {{ $events := newRequest "https://www.googleapis.com/calendar/v3/calendars/primary/events"
                | withParameter "timeMin" $now
                | withParameter "timeMax" $future
                | withParameter "singleEvents" "true"
                | withParameter "orderBy" "startTime"
                | withHeader "Authorization" (print "Bearer " $accessToken)
                | getResponse }}

              {{ if ne $events.Response.StatusCode 200 }}
                <p>Event Error: {{ $events.Response.Status }}</p>
              {{ else }}

                <div>
                  {{ $currentDate := "" }}

                  {{ range $events.JSON.Array "items" }}

                    {{/* ---- Extract event fields ---- */}}
                    {{ $summary := .String "summary" }}
                    {{ $location := .String "location" }}
                    {{ $description := .String "description" }}

                    {{/* ---- Compute start/end + all-day ---- */}}
                    {{ $startRaw := .String "start.dateTime" }}
                    {{ $isAllDay := false }}
                    {{ $start := "" }}
                    {{ $end := "" }}

                    {{ if eq $startRaw "" }}
                      {{ $isAllDay = true }}
                      {{ $start = (.String "start.date") | parseLocalTime "DateOnly" }}
                      {{ $end = (.String "end.date") | parseLocalTime "DateOnly" }}
                    {{ else }}
                      {{ $start = $startRaw | parseTime "rfc3339" }}
                      {{ $end = (.String "end.dateTime") | parseTime "rfc3339" }}
                    {{ end }}

                    {{ $eventDate := $start | formatTime "Mon, Jan 2" }}

                    {{/* ---- Date header ---- */}}
                    {{ if ne $eventDate $currentDate }}
                      <div style="
                        {{ if ne $currentDate "" }}margin-top:20px;{{ end }}
                        font-size:14px;
                        font-weight:600;
                        opacity:0.7;">
                        {{ $eventDate }}
                      </div>
                      {{ $currentDate = $eventDate }}
                    {{ end }}

                    <div style="padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06);">

                      {{ if ne $summary "" }}
                        <div style="font-weight:500;">
                          {{ $summary }}
                        </div>
                      {{ end }}

                      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div style="font-size:13px; opacity:0.6;">
                          {{ if not $isAllDay }}
                            {{ $start | formatTime "3:04 PM" }} - {{ $end | formatTime "3:04 PM" }}
                          {{ else }}
                            All Day
                          {{ end }}
                        </div>

                        <div style="font-size:13px; opacity:0.5;" {{ $start | toRelativeTime }}>
                        </div>
                      </div>

                      {{ if ne $location "" }}
                        <div style="margin-top:6px; font-size:13px; opacity:0.7;">
                          {{ $location }}
                        </div>
                      {{ end }}

                      {{ if ne $description "" }}
                        <div style="margin-top:6px; font-size:13px; opacity:0.65; line-height:1.4;">
                          {{ $description }}
                        </div>
                      {{ end }}

                    </div>

                  {{ end }}   {{/* END range */}}
                </div>

              {{ end }}   {{/* END events status check */}}
            {{ end }}     {{/* END token status check */}}

    - size: full
      widgets:
        - type: group
          widgets:
            - type: hacker-news
            - type: lobsters

        - type: videos
          channels:
            - UCXuqSBlHAE6Xw-yeJA0Tunw
            - UCR-DXc1voovS8nhAvccRZhg
            - UCsBjURrPoezykLs9EqgamOA
            - UCBJycsmduvYEL83R_U4JriQ
            - UCHnyfMqiRRG1u-2MsSQLbXA

        - type: group
          widgets:
            - type: reddit
              subreddit: technology
              show-thumbnails: true
            - type: reddit
              subreddit: selfhosted
              show-thumbnails: true

    - size: small
      widgets:
        - type: markets
          markets:
            - symbol: SPY
              name: S&P 500
            - symbol: BTC-USD
              name: Bitcoin
            - symbol: NVDA
              name: NVIDIA
            - symbol: AAPL
              name: Apple
            - symbol: MSFT
              name: Microsoft

        - type: custom-api
          title: Home Controls
          cache: 15m
          template: |
            {{/* ================= Home Assistant Variables ================= */}}
            {{ $haURL := "http://192.168.0.124:8123" }}
            {{ $haToken := "${HOME_ASSISTANT_TOKEN}" }}

            {{/* ================= Fetch Entity States ================= */}}
            {{ $states := newRequest (print $haURL "/api/states")
              | withHeader "Authorization" (print "Bearer " $haToken)
              | getResponse }}
            
            {{/* ================= Extract the Entities ================= */}}
            {{ if ne $states.Response.StatusCode 200 }}
              <p>Home Assistant Error: {{ $states.Response.Status }}</p>
            {{ else }}


              {{ $switch1 := "" }}
              {{ $switch2 := "" }}
              {{ $lamp := "" }}
              {{ $brightness := 0 }}


              {{ range $states.JSON.Array "" }}
                {{ if eq (.String "entity_id") "switch.${SWITCH_1_ENTRY_ID}" }}
                  {{ $switch1 = .String "state" }}
                {{ end }}
                {{ if eq (.String "entity_id") "switch.${SWITCH_2_ENTRY_ID}" }}
                  {{ $switch2 = .String "state" }}
                {{ end }}
                {{ if eq (.String "entity_id") "light.${LIGHT_1_ENTRY_ID}" }}
                  {{ $lamp = .String "state" }}
                  {{ $brightness = .Int "attributes.brightness" }}
                {{ end }}
              {{ end }}

              {{/* ================= Render the Card ================= */}}
              <div style="padding:16px;">

                <!-- Switch 1 -->
                <div style="padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; justify-content:space-between; align-items:center;">
                  <div>Switch 1</div>
                  <div style="opacity:0.7;">
                    {{ if eq $switch1 "on" }}🟢 On{{ else }}⚪ Off{{ end }}
                  </div>
                </div>

                <!-- Switch 2 -->
                <div style="padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; justify-content:space-between; align-items:center;">
                  <div>Switch 2</div>
                  <div style="opacity:0.7;">
                    {{ if eq $switch2 "on" }}🟢 On{{ else }}⚪ Off{{ end }}
                  </div>
                </div>

                <!-- Dimming Lamp -->
                <div style="padding:12px 0; display:flex; justify-content:space-between; align-items:center;">
                  <div>Lamp</div>
                  <div style="opacity:0.7;">
                    {{ if eq $lamp "on" }}💡 On{{ else }}⚫ Off{{ end }}
                  </div>
                </div>

              </div>
            {{ end }}
