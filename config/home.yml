- name: Home
  # Optionally, if you only have a single page you can hide the desktop navigation for a cleaner look
  # hide-desktop-navigation: true
  columns:
    - size: small
      widgets:
        - type: weather
          location: Bellevue, Washington, United States
          units: imperial # alternatively "metric"
          hour-format: 12h # alternatively "24h"
          # Optionally hide the location from being displayed in the widget
          # hide-location: true

        - type: calendar
          first-day-of-week: monday

        - type: custom-api
          title: Reformatted Events
          cache: 15m
          template: |
            {{/* ================= TOKEN ================= */}}
            {{ $token := newRequest "https://oauth2.googleapis.com/token"
              | withHeader "Content-Type" "application/x-www-form-urlencoded"
              | withStringBody "client_id=${GOOGLE_CLIENT_ID}&client_secret=${GOOGLE_CLIENT_SECRET}&refresh_token=${GOOGLE_REFRESH_TOKEN}&grant_type=refresh_token"
              | getResponse }}

            {{ if ne $token.Response.StatusCode 200 }}
              <p>Token Error: {{ $token.Response.Status }}</p>
            {{ else }}

              {{ $accessToken := $token.JSON.String "access_token" }}
              {{ $now := now | formatTime "rfc3339" }}
              {{ $future := offsetNow "720h" | formatTime "rfc3339" }}

              {{/* ================= EVENTS ================= */}}
              {{ $events := newRequest "https://www.googleapis.com/calendar/v3/calendars/primary/events"
                | withParameter "timeMin" $now
                | withParameter "timeMax" $future
                | withParameter "singleEvents" "true"
                | withParameter "orderBy" "startTime"
                | withHeader "Authorization" (print "Bearer " $accessToken)
                | getResponse }}

              {{ if ne $events.Response.StatusCode 200 }}
                <p>Event Error: {{ $events.Response.Status }}</p>
              {{ else }}

                <div style="padding:16px;">
                  {{ $currentDate := "" }}

                  {{ range $events.JSON.Array "items" }}

                    {{/* ===== PREDECLARE VARIABLES (IMPORTANT) ===== */}}
                    {{ $start := "" }}
                    {{ $end := "" }}
                    {{ $isAllDay := false }}

                    {{ $startRaw := .String "start.dateTime" }}
                    {{ if eq $startRaw "" }}
                      {{ $isAllDay = true }}
                      {{ $start = (.String "start.date") | parseLocalTime "DateOnly" }}
                      {{ $end = (.String "end.date") | parseLocalTime "DateOnly" }}
                    {{ else }}
                      {{ $start = $startRaw | parseTime "rfc3339" }}
                      {{ $end = (.String "end.dateTime") | parseTime "rfc3339" }}
                    {{ end }}

                    {{ $eventDate := $start | formatTime "Mon, Jan 2" }}

                    {{/* ===== DATE HEADER ===== */}}
                    {{ if ne $eventDate $currentDate }}
                      {{ $currentDate = $eventDate }}
                      <div style="margin-top:20px; font-size:14px; font-weight:600; opacity:0.7;">
                        {{ $eventDate }}
                      </div>
                    {{ end }}

                    {{/* ===== EVENT ROW ===== */}}
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06);">

                      <div>
                        <div style="font-weight:500;">
                          {{ .String "summary" }}
                        </div>

                        {{ if not $isAllDay }}
                          <div style="font-size:13px; opacity:0.6;">
                            {{ $start | formatTime "3:04 PM" }} -
                            {{ $end | formatTime "3:04 PM" }}
                          </div>
                        {{ else }}
                          <div style="font-size:13px; opacity:0.6;">
                            All Day
                          </div>
                        {{ end }}
                      </div>

                      <div style="font-size:13px; opacity:0.5;">
                        {{ $start | toRelativeTime }}
                      </div>

                    </div>

                  {{ end }}
                </div>

              {{ end }}
            {{ end }}

    - size: full
      widgets:
        - type: group
          widgets:
            - type: hacker-news
            - type: lobsters

        - type: videos
          channels:
            - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
            - UCR-DXc1voovS8nhAvccRZhg # Jeff Geerling
            - UCsBjURrPoezykLs9EqgamOA # Fireship
            - UCBJycsmduvYEL83R_U4JriQ # Marques Brownlee
            - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium

        - type: group
          widgets:
            - type: reddit
              subreddit: technology
              show-thumbnails: true
            - type: reddit
              subreddit: selfhosted
              show-thumbnails: true
