- name: Home
  columns:
    - size: small
      widgets:
        - type: weather
          location: Bellevue, Washington, United States
          units: imperial
          hour-format: 12h

        - type: calendar
          first-day-of-week: monday

        - type: custom-api
          title: Upcoming Events
          cache: 15m
          template: |
            {{/* ================= TOKEN ================= */}}
            {{ $token := newRequest "https://oauth2.googleapis.com/token"
              | withHeader "Content-Type" "application/x-www-form-urlencoded"
              | withStringBody "client_id=${GOOGLE_CLIENT_ID}&client_secret=${GOOGLE_CLIENT_SECRET}&refresh_token=${GOOGLE_REFRESH_TOKEN}&grant_type=refresh_token"
              | getResponse }}

            {{ if ne $token.Response.StatusCode 200 }}
              <p>Token Error: {{ $token.Response.Status }}</p>
            {{ else }}

              {{ $accessToken := $token.JSON.String "access_token" }}
              {{ $now := now | formatTime "rfc3339" }}
              {{ $future := offsetNow "720h" | formatTime "rfc3339" }}

              {{/* ================= EVENTS ================= */}}
              {{ $events := newRequest "https://www.googleapis.com/calendar/v3/calendars/primary/events"
                | withParameter "timeMin" $now
                | withParameter "timeMax" $future
                | withParameter "singleEvents" "true"
                | withParameter "orderBy" "startTime"
                | withHeader "Authorization" (print "Bearer " $accessToken)
                | getResponse }}

              {{ if ne $events.Response.StatusCode 200 }}
                <p>Event Error: {{ $events.Response.Status }}</p>
              {{ else }}

                <div>
                  {{ $currentDate := "" }}

                  {{ range $events.JSON.Array "items" }}

                    {{/* ---- Extract event fields ---- */}}
                    {{ $summary := .String "summary" }}
                    {{ $location := .String "location" }}
                    {{ $description := .String "description" }}

                    {{/* ---- Compute start/end + all-day ---- */}}
                    {{ $startRaw := .String "start.dateTime" }}
                    {{ $isAllDay := false }}
                    {{ $start := "" }}
                    {{ $end := "" }}

                    {{ if eq $startRaw "" }}
                      {{ $isAllDay = true }}
                      {{ $start = (.String "start.date") | parseLocalTime "DateOnly" }}
                      {{ $end = (.String "end.date") | parseLocalTime "DateOnly" }}
                    {{ else }}
                      {{ $start = $startRaw | parseTime "rfc3339" }}
                      {{ $end = (.String "end.dateTime") | parseTime "rfc3339" }}
                    {{ end }}

                    {{ $eventDate := $start | formatTime "Mon, Jan 2" }}

                    {{/* ---- Date header ---- */}}
                    {{ if ne $eventDate $currentDate }}
                      <div style="
                        {{ if ne $currentDate "" }}margin-top:20px;{{ end }}
                        font-size:14px;
                        font-weight:600;
                        opacity:0.7;">
                        {{ $eventDate }}
                      </div>
                      {{ $currentDate = $eventDate }}
                    {{ end }}

                    <div style="padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06);">

                      {{ if ne $summary "" }}
                        <div style="font-weight:500;">
                          {{ $summary }}
                        </div>
                      {{ end }}

                      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div style="font-size:13px; opacity:0.6;">
                          {{ if not $isAllDay }}
                            {{ $start | formatTime "3:04 PM" }} - {{ $end | formatTime "3:04 PM" }}
                          {{ else }}
                            All Day
                          {{ end }}
                        </div>

                        <div style="font-size:13px; opacity:0.5;" {{ $start | toRelativeTime }}>
                        </div>
                      </div>

                      {{ if ne $location "" }}
                        <div style="margin-top:6px; font-size:13px; opacity:0.7;">
                          {{ $location }}
                        </div>
                      {{ end }}

                      {{ if ne $description "" }}
                        <div style="margin-top:6px; font-size:13px; opacity:0.65; line-height:1.4;">
                          {{ $description }}
                        </div>
                      {{ end }}

                    </div>

                  {{ end }}   {{/* END range */}}
                </div>

              {{ end }}   {{/* END events status check */}}
            {{ end }}     {{/* END token status check */}}

    - size: full
      widgets:
        - type: group
          widgets:
            - type: hacker-news
            - type: lobsters

        - type: videos
          channels:
            - UCXuqSBlHAE6Xw-yeJA0Tunw
            - UCR-DXc1voovS8nhAvccRZhg
            - UCsBjURrPoezykLs9EqgamOA
            - UCBJycsmduvYEL83R_U4JriQ
            - UCHnyfMqiRRG1u-2MsSQLbXA

        - type: group
          widgets:
            - type: reddit
              subreddit: technology
              show-thumbnails: true
            - type: reddit
              subreddit: selfhosted
              show-thumbnails: true

    - size: small
      widgets:
        - type: markets
          markets:
            - symbol: SPY
              name: S&P 500
            - symbol: BTC-USD
              name: Bitcoin
            - symbol: NVDA
              name: NVIDIA
            - symbol: AAPL
              name: Apple
            - symbol: MSFT
              name: Microsoft

        - type: custom-api
          title: Home Controls
          cache: 3s
          template: |
            <style>
              .device-card {
                padding: 8px;
                margin-bottom: 8px;
                border-radius: 8px;
              }

              .device-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
              }

              .device-name {
                font-weight: bold;
              }

              .status-on {
                color: var(--color-positive);
                font-weight: bold;
              }

              .status-off {
                color: var(--color-negative);
                font-weight: bold;
              }

              .btn {
                font-size: 18px;
                margin-left: 6px;
                cursor: pointer;
              }

              .brightness-controls button {
                margin-left: 6px;
              }

              .dimmer-container {
                margin-top: 8px;
              }

              .dimmer-slider {
                width: 100%;
                margin-top: 6px;
                -webkit-appearance: none;
                height: 6px;
                border-radius: 4px;
                background: #ccc;
                outline: none;
              }

              .dimmer-slider::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 16px;
                height: 16px;
                border-radius: 50%;
                background: var(--color-primary);
                cursor: pointer;
              }

              .dimmer-slider::-moz-range-thumb {
                width: 16px;
                height: 16px;
                border-radius: 50%;
                background: var(--color-primary);
                cursor: pointer;
              }
            </style>

            {{/* Fetch Switch 1 */}}
            {{ $switch1 := newRequest "${HOME_ASSISTANT_URL}/api/states/switch.${SWITCH_1_ENTITY_ID}"
                | withHeader "Authorization" "Bearer ${HOME_ASSISTANT_TOKEN}"
                | getResponse
            }}

            {{/* Fetch Switch 2 */}}
            {{ $switch2 := newRequest "${HOME_ASSISTANT_URL}/api/states/switch.${SWITCH_2_ENTITY_ID}"
                | withHeader "Authorization" "Bearer ${HOME_ASSISTANT_TOKEN}"
                | getResponse
            }}

            {{/* Fetch Light */}}
            {{ $light := newRequest "${HOME_ASSISTANT_URL}/api/states/light.${LIGHT_1_ENTITY_ID}"
                | withHeader "Authorization" "Bearer ${HOME_ASSISTANT_TOKEN}"
                | getResponse
            }}

            {{ if and (eq $switch1.Response.StatusCode 200) (eq $switch2.Response.StatusCode 200) (eq $light.Response.StatusCode 200) }}

              {{ $s1State := $switch1.JSON.String "state" }}
              {{ $s2State := $switch2.JSON.String "state" }}
              {{ $lightState := $light.JSON.String "state" }}
              {{ $brightness := $light.JSON.Int "attributes.brightness" }}

              <!-- SWITCH 1 -->
              <div class="device-card widget-content-frame">
                <div class="device-row">
                  <div>
                    <div class="device-name">${SWITCH_1_DISPLAY_NAME}</div>
                    <div class="{{ if eq $s1State "on" }}status-on{{ else }}status-off{{ end }}">
                      {{ $s1State }}
                    </div>
                  </div>
                  <div>
                    <button class="btn"
                      onclick="
                        fetch('${HOME_ASSISTANT_URL}/api/services/switch/toggle', {
                          method: 'POST',
                          headers: {
                            'Authorization': 'Bearer ${HOME_ASSISTANT_TOKEN}',
                            'Content-Type': 'application/json'
                          },
                          body: JSON.stringify({
                            entity_id: 'switch.${SWITCH_1_ENTITY_ID}'
                          })
                        })
                        .then(async response => {
                          if (!response.ok) {
                            const text = await response.text();
                            console.error('Home Assistant error:', response.status, text);
                            alert('Error: ' + response.status);
                            return;
                          }

                          console.log('Success:', response.status);
                          setTimeout(() => location.reload(), 500);
                        })
                        .catch(error => {
                          console.error('Network error:', error);
                          alert('Network error - check console');
                        });
                      ">
                      🔄
                    </button>
                  </div>
                </div>
              </div>

              <!-- SWITCH 2 -->
              <div class="device-card widget-content-frame">
                <div class="device-row">
                  <div>
                    <div class="device-name">${SWITCH_2_DISPLAY_NAME}</div>
                    <div class="{{ if eq $s2State "on" }}status-on{{ else }}status-off{{ end }}">
                      {{ $s2State }}
                    </div>
                  </div>
                  <div>
                    <button class="btn"
                      onclick="
                        fetch('${HOME_ASSISTANT_URL}/api/services/switch/toggle', {
                          method: 'POST',
                          headers: {
                            'Authorization': 'Bearer ${HOME_ASSISTANT_TOKEN}',
                            'Content-Type': 'application/json'
                          },
                          body: JSON.stringify({
                            entity_id: 'switch.${SWITCH_2_ENTITY_ID}'
                          })
                        })
                        .then(async response => {
                          if (!response.ok) {
                            const text = await response.text();
                            console.error('Home Assistant error:', response.status, text);
                            alert('Error: ' + response.status);
                            return;
                          }

                          console.log('Success:', response.status);
                          setTimeout(() => location.reload(), 500);
                        })
                        .catch(error => {
                          console.error('Network error:', error);
                          alert('Network error - check console');
                        });
                      ">
                      🔄
                    </button>
                  </div>
                </div>
              </div>

              <!-- LIGHT -->
              <div class="device-card widget-content-frame">
                <div class="device-row">
                  <div style="width:100%;">
                    <div class="device-name">${LIGHT_1_DISPLAY_NAME}</div>

                    <!-- Dummy State -->
                    <div class="{{ if eq $lightState "on" }}status-on{{ else }}status-off{{ end }}">
                      {{ $lightState }}
                    </div>

                    <!-- Brightness Label -->
                    <div class="slider-value" style="font-size:12px;">
                      Brightness: {{ $brightness }} / 255
                    </div>

                  </div>

                  <!-- Toggle Button -->
                  <div>
                    <button class="btn"
                      onclick="fetch('${HOME_ASSISTANT_URL}/api/services/light/toggle', {
                        method: 'POST',
                        headers: {
                          'Authorization': 'Bearer ${HOME_ASSISTANT_TOKEN}',
                          'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({entity_id: 'light.${LIGHT_1_ENTITY_ID}'})
                      })
                      .then(response => response.ok ? location.reload() : alert('Error'))
                      .catch(() => alert('Network error'));">
                      💡
                    </button>
                  </div>

                </div>

                <!-- Dimmer Slider -->
                <div class="dimmer-container">
                  <input
                    type="range"
                    min="0"
                    max="255"
                    value="{{ $brightness }}"
                    class="dimmer-slider"
                    id="brightnessSlider"
                    onchange="
                      document.querySelector('.slider-value').innerText = 'Brightness: ' + value + ' / 255';
                      fetch('${HOME_ASSISTANT_URL}/api/services/light/turn_on', {
                        method: 'POST',
                        headers: {
                          'Authorization': 'Bearer ${HOME_ASSISTANT_TOKEN}',
                          'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                          entity_id: 'light.${LIGHT_1_ENTITY_ID}',
                          brightness: parseInt(value)
                        })
                      })
                      .then(response => response.ok ? console.log('Brightness updated') : alert('Error updating brightness'))
                      .catch(() => alert('Network error'));
                    " />
                </div>
              </div>

            {{ else }}
              <div class="status-off">Failed to connect to Home Assistant</div>
              <div class="status-off">switch 1: {{ $switch1.Response.StatusCode }}</div>
              <div class="status-off">switch 2: {{ $switch2.Response.StatusCode }}</div>
              <div class="status-off">light: {{ $light.Response.StatusCode }}</div>
            {{ end }}
