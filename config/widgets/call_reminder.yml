- type: custom-api
  title: Testing Call Reminder Widget
  cache: 15m
  url: ${FLASK_SERVER}/notion/contacts
  template: |
    <div>
      {{ $maxItems := 6 }}
      {{ $shown := 0 }}

      {{/* --------------------------- Loop over all people --------------------------- */}}
      {{ range $person := .JSON.Array "people" }}
        {{ if lt $shown $maxItems }}
          {{/* Determine color based on status */}}
          {{ $color := "green" }}
          {{ if eq ($person.String "status") "overdue" }}{{ $color = "red" }}{{ end }}
          {{ if eq ($person.String "status") "approaching" }}{{ $color = "yellow" }}{{ end }}

          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <div style="width:170px;">
              <div class="size-h2">{{ $person.String "name" }}</div>
              <div class="size-h4 color-{{ $color }}">
                {{ printf "%.1fx" ($person.Float "urgency") }} · {{ $person.Int "days_since" }}d ago · ~{{ $person.Int "frequency" }}d
              </div>
            </div>
            <div style="display:flex; gap:6px;">
              <button class="size-h4">📞</button>
              <button class="size-h4">💬</button>
              <button class="size-h4">⏳</button>
            </div>
          </div>

          {{ $shown = add $shown 1 }}
        {{ end }}
      {{ end }}

      {{/* --------------------------- Show All Link --------------------------- */}}
      <div style="margin-top:8px;">
        <a href="#" class="size-h4 color-primary">Show All</a>
      </div>
    </div>